# ==========================
# 1. ERGONOMICS & BEHAVIOR
# ==========================

# Use Ctrl+a instead of the default Ctrl+b prefix.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support for pane switching, resizing, and scrolling.
set-option -g mouse on

# Use a 256-color capable terminal definition.
set-option -g default-terminal "tmux-256color"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# Start window and pane numbering at 1.
set-option -g base-index 1
set-option -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Place the status bar at the top.
set-option -g status-position top
# set-option -g allow-rename off
# set-window-option -g automatic-rename off

# ==========================
# 2. INTUITIVE SPLITS
# ==========================

# Keep new panes in the current pane's working directory.
unbind '"'
unbind %
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Reload configuration without restarting tmux.
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded."

# ==========================
# 3. PLUGINS (Requires TPM)
# ==========================

set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @plugin 'catppuccin/tmux'

# Restore the last saved environment automatically on startup.
set-option -g @continuum-restore 'on'

# # ==========================
# # 4. CATPPUCCIN
# # ==========================

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set-hook -g client-dark-theme {
  set -g @catppuccin_flavor "frappe"
  set -g @catppuccin_reset "true"

  if-shell 'test -r ~/.local/share/tmux/plugins/tmux/catppuccin.tmux' 'run ~/.local/share/tmux/plugins/tmux/catppuccin.tmux'
}
set-hook -g client-light-theme {
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"

  if-shell 'test -r ~/.local/share/tmux/plugins/tmux/catppuccin.tmux' 'run ~/.local/share/tmux/plugins/tmux/catppuccin.tmux'
}

# Load catppuccin
if-shell 'test -r ~/.local/share/tmux/plugins/tmux/catppuccin.tmux' 'run ~/.local/share/tmux/plugins/tmux/catppuccin.tmux'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Initialize TPM. Keep this at the bottom of the file.
if-shell 'test -r ~/.local/share/tmux/plugins/tpm/tpm' 'run ~/.local/share/tmux/plugins/tpm/tpm'
